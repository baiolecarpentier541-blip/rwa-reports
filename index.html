<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RWA 每日简报</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif; background: #0f1117; color: #e8e8e8; min-height: 100vh; padding: 24px; }
    .container { max-width: 1100px; margin: 0 auto; }
    header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 1px solid #2a2a3a; }
    header h1 { font-size: 22px; font-weight: 600; color: #fff; }
    header .date { font-size: 14px; color: #888; }
    .report-date-badge { display: inline-block; background: linear-gradient(135deg, #1a1d2e, #252840); border: 1px solid #3a3a5c; border-radius: 8px; padding: 10px 18px; font-size: 15px; color: #b8bcd8; margin-bottom: 24px; }
    .copy-hint { background: #1e2030; border: 1px solid #3a3a5c; border-radius: 8px; padding: 10px 16px; font-size: 12px; color: #7c8db5; margin-bottom: 20px; text-align: center; }
    .report-card { background: #161822; border: 1px solid #222438; border-radius: 14px; padding: 24px 28px; margin-bottom: 20px; }
    .report-card h2 { font-size: 13px; color: #7c8db5; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 18px; font-weight: 500; }
    .market-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-box { background: #0f1117; border: 1px solid #222438; border-radius: 10px; padding: 16px; text-align: center; }
    .stat-box .label { font-size: 11px; color: #5a6280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
    .stat-box .value { font-size: 20px; font-weight: 700; color: #fff; }
    .stat-box .sub { font-size: 11px; margin-top: 3px; }
    .positive { color: #4caf50; }
    .negative { color: #f44336; }
    .asset-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .asset-table th { text-align: left; padding: 8px 12px; color: #5a6280; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #222438; font-weight: 500; }
    .asset-table td { padding: 10px 12px; border-bottom: 1px solid #1a1d2a; color: #c8cce0; }
    .asset-table tr:last-child td { border-bottom: none; }
    .asset-table td:nth-child(2) { text-align: right; font-weight: 600; color: #fff; font-variant-numeric: tabular-nums; }
    .asset-table td:nth-child(3) { text-align: right; font-size: 12px; }
    .asset-table tr:hover td { background: #1a1d2e; }
    .stablecoin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .coin-item { background: #0f1117; border: 1px solid #222438; border-radius: 10px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
    .coin-item .name { font-size: 14px; color: #c8cce0; font-weight: 500; }
    .coin-item .cap { font-size: 16px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
    .news-list { list-style: none; }
    .news-list li { padding: 12px 0; border-bottom: 1px solid #1e2130; display: flex; gap: 12px; align-items: flex-start; }
    .news-list li:last-child { border-bottom: none; }
    .news-tag { flex-shrink: 0; font-size: 10px; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
    .tag-high { background: #2d1f1f; color: #f44336; border: 1px solid #5a2020; }
    .tag-mid { background: #2a2417; color: #ff9800; border: 1px solid #5a4510; }
    .tag-low { background: #1a2535; color: #64b5f6; border: 1px solid #1e4080; }
    .news-content { flex: 1; }
    .news-content .title { font-size: 14px; color: #d8dcf0; margin-bottom: 4px; line-height: 1.5; }
    .news-content .meta { font-size: 11px; color: #4a5070; }
    .news-content a { color: #5a8fd4; text-decoration: none; }
    .news-content a:hover { text-decoration: underline; }
    .summary-box { background: #0f1117; border: 1px solid #222438; border-left: 3px solid #5a8fd4; border-radius: 10px; padding: 16px 20px; font-size: 14px; color: #b8bcd8; line-height: 1.8; }
    footer { margin-top: 28px; text-align: center; font-size: 11px; color: #3a3f55; }
    footer a { color: #5a6280; }
    @media (max-width: 768px) { body { padding: 16px; } .market-summary { grid-template-columns: repeat(2, 1fr); } .stablecoin-grid { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>RWA 每日简报</h1>
      <span class="date">由 Jarvis 自动生成</span>
    </header>
    <div class="report-date-badge" id="reportDate"></div>
    <div class="copy-hint">📋 所有内容均可直接选中复制，方便核对与发布</div>

    <div class="report-card">
      <h2>RWA 品类数据（除稳定币外七大品类）</h2>
      <div class="market-summary">
        <div class="stat-box"><div class="label">RWA 总市值</div><div class="value" id="rwaTotal"></div><div class="sub" id="rwaTotalChg"></div></div>
        <div class="stat-box"><div class="label">稳定币</div><div class="value" id="stableCap"></div><div class="sub" id="stableCapChg"></div></div>
        <div class="stat-box"><div class="label">非稳定币</div><div class="value" id="nonStableCap"></div><div class="sub" id="nonStableCapChg"></div></div>
        <div class="stat-box"><div class="label">持有人</div><div class="value" id="holders"></div><div class="sub" id="holdersChg"></div></div>
      </div>
      <table class="asset-table">
        <thead><tr><th>品类</th><th>市值</th><th>7天涨跌</th></tr></thead>
        <tbody id="assetBody"></tbody>
      </table>
    </div>

    <div class="report-card">
      <h2>稳定币市值</h2>
      <div class="stablecoin-grid" id="stablecoinGrid"></div>
    </div>

    <div class="report-card">
      <h2>市场动态（24h 内重要新闻）</h2>
      <ul class="news-list" id="newsList"></ul>
    </div>

    <div class="report-card">
      <h2>市场总结</h2>
      <div class="summary-box" id="summaryBox"></div>
    </div>

    <footer>
      数据来源：<a href="https://coinfound.com" target="_blank">CoinFound</a> &nbsp;|&nbsp;
      生成时间：<span id="genTime"></span> &nbsp;|&nbsp;
      Powered by Jarvis 🤖
    </footer>
  </div>
  <script>
    const DATA = JSON.parse('{"date": "4月8日", "genTime": "2026-04-08 22:52", "rwaTotal": "417.67 亿美元", "rwaTotalChg": 0.0221, "stableCap": "322.75 亿美元", "stableCapChg": 0.0014, "nonStableCap": "94.92 亿美元", "nonStableCapChg": 0.0996, "holders": "283.49 亿", "holdersChg": 0.0035, "assets": [{"name": "Private Credit", "cap": "39.65 亿美元", "chg": 0.2181}, {"name": "Corp Bond", "cap": "27.22 亿美元", "chg": 0.0046}, {"name": "Treasuries", "cap": "13.61 亿美元", "chg": 0.0481}, {"name": "Commodities", "cap": "7.24 亿美元", "chg": 0.0218}, {"name": "Funds", "cap": "3.51 亿美元", "chg": 0.1986}, {"name": "Gov Bonds", "cap": "1.86 亿美元", "chg": 0.0005}, {"name": "Tokenized Equities", "cap": "1.84 亿美元", "chg": 0.008}], "stablecoins": [{"name": "USDT", "cap": "196.36"}, {"name": "USDC", "cap": "77.47"}, {"name": "EURC", "cap": "12.29"}, {"name": "DAI", "cap": "5.62"}, {"name": "PYUSD", "cap": "3.99"}], "news": [{"tag": "高", "tagClass": "tag-high", "title": "（等待新闻数据）", "source": "CoinFound", "url": "#"}], "summary": "RWA总市值417.67亿美元，7天+2.21%。Private Credit领涨+21.81%，Tokenized Equities表现最弱+0.80%。"}');
    function pct(v) { return (v >= 0 ? '+' : '') + (v * 100).toFixed(2) + '%'; }
    function render() {
      document.getElementById('reportDate').textContent = '📅 ' + DATA.date + '（UTC+8）';
      document.getElementById('genTime').textContent = DATA.genTime;
      var els = ['rwaTotal','stableCap','nonStableCap','holders'];
      var chgs = ['rwaTotalChg','stableCapChg','nonStableCapChg','holdersChg'];
      document.getElementById('rwaTotal').textContent = DATA.rwaTotal;
      document.getElementById('rwaTotalChg').textContent = pct(DATA.rwaTotalChg);
      document.getElementById('rwaTotalChg').className = 'sub ' + (DATA.rwaTotalChg>=0?'positive':'negative');
      document.getElementById('stableCap').textContent = DATA.stableCap;
      document.getElementById('stableCapChg').textContent = pct(DATA.stableCapChg);
      document.getElementById('stableCapChg').className = 'sub ' + (DATA.stableCapChg>=0?'positive':'negative');
      document.getElementById('nonStableCap').textContent = DATA.nonStableCap;
      document.getElementById('nonStableCapChg').textContent = pct(DATA.nonStableCapChg);
      document.getElementById('nonStableCapChg').className = 'sub ' + (DATA.nonStableCapChg>=0?'positive':'negative');
      document.getElementById('holders').textContent = DATA.holders;
      document.getElementById('holdersChg').textContent = pct(DATA.holdersChg);
      document.getElementById('holdersChg').className = 'sub ' + (DATA.holdersChg>=0?'positive':'negative');
      var body = document.getElementById('assetBody');
      body.innerHTML = DATA.assets.map(function(a){
        return '<tr><td>'+a.name+'</td><td>'+a.cap+'</td><td class="'+(a.chg>=0?'positive':'negative')+'">'+pct(a.chg)+'</td></tr>';
      }).join('');
      var grid = document.getElementById('stablecoinGrid');
      grid.innerHTML = DATA.stablecoins.map(function(c){
        return '<div class="coin-item"><span class="name">'+c.name+'</span><span class="cap">'+c.cap+' 亿美元</span></div>';
      }).join('');
      var nl = document.getElementById('newsList');
      nl.innerHTML = DATA.news.map(function(n){
        return '<li><span class="news-tag '+n.tagClass+'">'+n.tag+'</span><div class="news-content"><div class="title">'+n.title+'</div><div class="meta">来源：'+n.source+' &nbsp;|&nbsp; <a href="'+n.url+'" target="_blank">查看原文 ↗</a></div></div></li>';
      }).join('');
      document.getElementById('summaryBox').textContent = DATA.summary;
    }
    render();
  </script>
</body>
</html>
